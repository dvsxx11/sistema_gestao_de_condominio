<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - Gestão de Condomínios</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<link href="style.css" rel="stylesheet" />
</head>
<body class="login-body">
<div class="container">
  <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fas fa-building fa-3x text-primary mb-3"></i>
            <h3 class="fw-bold">Gestão de Condomínios</h3>
            <p class="text-muted small">Acesse sua conta para continuar</p>
          </div>
          <div id="loginAlert"></div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" id="username" class="form-control" value="admin" required />
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Senha</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-control" value="admin123" required />
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              <i class="fas fa-sign-in-alt me-2"></i>Entrar
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
