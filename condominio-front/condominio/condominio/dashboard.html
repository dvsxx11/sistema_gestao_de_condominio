<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Gestão de Condomínios</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <button
      class="btn btn-dark d-md-none m-2 sidebar-toggle"
      id="sidebarToggle"
    >
      <i class="fas fa-bars"></i>
    </button>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-building me-2"></i><span>Condomínios</span>
      </div>
      <nav class="sidebar-nav">
        <a
          href="#"
          class="nav-link"
          onclick="
            carregarPagina('condominios');
            return false;
          "
          ><i class="fas fa-building"></i> Condomínios</a
        >
        <a
          href="#"
          class="nav-link"
          onclick="
            carregarPagina('unidades');
            return false;
          "
          ><i class="fas fa-home"></i> Unidades</a
        >
        <a
          href="#"
          class="nav-link"
          onclick="
            carregarPagina('moradores');
            return false;
          "
          ><i class="fas fa-users"></i> Moradores</a
        >
        <a
          href="#"
          class="nav-link"
          onclick="
            carregarPagina('veiculos');
            return false;
          "
          ><i class="fas fa-car"></i> Veículos</a
        >
        <a
          href="#"
          class="nav-link"
          onclick="
            carregarPagina('encomendas');
            return false;
          "
          ><i class="fas fa-box"></i> Encomendas</a
        >
        <a
          href="#"
          class="nav-link"
          onclick="
            carregarPagina('areas_comuns');
            return false;
          "
          ><i class="fas fa-swimming-pool"></i> Áreas Comuns</a
        >
        <a
          href="#"
          class="nav-link"
          onclick="
            carregarPagina('reservas');
            return false;
          "
          ><i class="fas fa-calendar"></i> Reservas</a
        >
        <a
          href="#"
          class="nav-link"
          onclick="
            carregarPagina('ocorrencias');
            return false;
          "
          ><i class="fas fa-exclamation-triangle"></i> Ocorrências</a
        >
        <a href="#" class="nav-link mt-3 text-danger" id="logoutBtn"
          ><i class="fas fa-sign-out-alt"></i> Sair</a
        >
      </nav>
    </aside>

    <main class="content">
      <header
        class="page-header d-flex justify-content-between align-items-center mb-4"
      >
        <h2 id="pageTitle" class="mb-0">Bem-vindo</h2>
      </header>
      <div id="notificationArea"></div>
      <div id="pageContent">
        <div class="card border-0 shadow-sm">
          <div class="card-body text-center py-5">
            <i class="fas fa-hand-pointer fa-3x text-muted mb-3"></i>
            <h4>Selecione uma opção no menu</h4>
            <p class="text-muted">
              Use o menu lateral para gerenciar o condomínio.
            </p>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="formModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="formModalTitle">Formulário</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <form id="formModalForm">
            <div class="modal-body" id="formModalBody"></div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                <i class="fas fa-times me-1"></i>Cancelar
              </button>
              <button type="submit" class="btn btn-success">
                <i class="fas fa-save me-1"></i>Salvar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
      // Verificar se o main.js carregou
      console.log("Dashboard carregado");
      console.log("carregarPagina existe?", typeof carregarPagina);
    </script>
  </body>
</html>
